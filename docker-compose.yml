services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prompthouse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prompthouse}
      POSTGRES_DB: ${POSTGRES_DB:-prompthouse}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-prompthouse}:${POSTGRES_PASSWORD:-prompthouse}@postgres:5432/${POSTGRES_DB:-prompthouse}
      API_KEY: ${API_KEY:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
    depends_on:
      - postgres

volumes:
  postgres_data:
